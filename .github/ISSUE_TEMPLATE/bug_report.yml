name: Bug report
description: Something in the app did not work, crashed, or showed the wrong thing
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. If a meet is affected right now, use **Save Meet to File** on the
        home page first — that file lets us reproduce exactly what you saw.

  - type: input
    id: build
    attributes:
      label: App version and build
      description: The line at the very bottom of any page in the app.
      placeholder: v1.0.0 (build 5bbbd4a)
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did the app do, and what did you expect instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Went to Program 2
        2. Entered results for race 1
        3. ...
    validations:
      required: true

  - type: dropdown
    id: screen
    attributes:
      label: Which step were you on?
      options:
        - Home
        - Meet setup
        - Entries
        - Divisions
        - Program 1
        - Program 2
        - Program 3
        - Results
        - Export
        - Not sure

  - type: textarea
    id: meet-file
    attributes:
      label: Meet file (optional)
      description: >
        Attach the .json from Save Meet to File if you can. Note it contains dog and owner names
        from your meet, and this issue is public — leave it out if that is a concern.
